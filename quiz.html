<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Geography Quiz - Europe</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <style>
        :root {
            --green-deep:   #416348;
            --green-mid:    #5A7E64;
            --olive:        #7F8563;
            --terra:        #DB7F50;
            --ink:          #2a2a1e;
            --cream:        #fdf8f2;
            --parchment:    #f5ece0;
        }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--parchment);
            color: var(--ink);
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(ellipse at 15% 60%, rgba(65,99,72,0.10) 0%, transparent 55%);
        }

        .navbar { padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.2); }
        .nav-link { text-decoration: none; color: var(--green-deep); margin-left: 1.5rem; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; }

        #progress-bar-wrap { max-width: 860px; margin: 2rem auto 0; padding: 0 1.2rem; }
        #progress-track { height: 8px; background: rgba(65,99,72,0.15); border-radius: 50px; overflow: hidden; }
        #progress-fill { height: 100%; background: linear-gradient(to right, var(--green-deep), var(--terra)); width: 0%; transition: width 0.5s ease; }

        #map-wrapper {
            position: relative; width: 90%; max-width: 860px; margin: 2rem auto;
            overflow: hidden; border-radius: 25px; border: 1.5px solid rgba(65,99,72,0.22);
            background: #d8eaf0; box-shadow: 0 10px 30px rgba(65,99,72,0.15);
        }
        #europe-svg { width: 100%; height: auto; display: block; }
        .country { fill: #f8f9f6; stroke: #8aaa90; stroke-width: 0.4; transition: fill 0.3s; }
        
        #control-bar { padding: 2rem 1rem; text-align: center; }
        .btn { font-family: 'Crimson Pro', serif; font-size: 1rem; font-weight: 600; padding: 0.8rem 2.5rem; border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .btn-primary { background: var(--green-deep); color: white; }
        .btn-terra { background: var(--terra); color: white; }

        #answer-input { padding: 0.8rem 1.5rem; border-radius: 50px; border: 2px solid var(--green-mid); outline: none; width: 250px; }
        .hidden { display: none !important; }
        #results-panel { display: none; flex-direction: column; align-items: center; gap: 1rem; padding: 3rem; background: var(--cream); border-radius: 30px; max-width: 500px; margin: 2rem auto; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a class="navbar-brand" href="index.html" style="color: var(--green-deep); font-weight: bold; text-decoration: none;">RESUME</a>
        <div>
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="aboutme.html">About Me</a>
            <a class="nav-link" href="experience.html">Experience</a>
            <a class="nav-link" href="quiz.html">Quiz</a>
        </div>
    </nav>

    <div id="progress-bar-wrap" class="hidden">
        <div id="progress-track"><div id="progress-fill"></div></div>
        <p style="text-align: right; margin-top: 0.5rem; color: var(--olive);">Question <span id="q-num">1</span> of 10</p>
    </div>

    <div id="map-wrapper">
        <svg id="europe-svg" viewBox="0 0 860 700"></svg>
    </div>

    <div id="results-panel">
        <h2 style="font-family: 'Playfair Display'; color: var(--green-deep);">Quiz Complete!</h2>
        <div id="score-display" style="font-size: 3rem; color: var(--terra); font-weight: bold;">0/10</div>
        <p id="score-message"></p>
        <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
    </div>

    <div id="control-bar">
        <div class="control-inner">
            <div id="state-start">
                <button class="btn btn-primary" onclick="startQuiz()">Start European Quiz</button>
            </div>
            <div id="state-question" class="hidden">
                <input type="text" id="answer-input" placeholder="Enter country name..." autocomplete="off"/>
                <button class="btn btn-terra" onclick="submitAnswer()">Submit</button>
            </div>
            <div id="state-feedback" class="hidden">
                <div id="feedback" style="font-size: 1.5rem; margin-bottom: 1rem;"></div>
                <button id="next-btn" class="btn btn-primary" onclick="nextQuestion()">Next</button>
            </div>
        </div>
    </div>

    <script>
        // Expanded to include virtually all European nations
        const QUIZ_COUNTRIES = {
            "Albania": { iso:"ALB", aliases:["albania"] }, "Austria": { iso:"AUT", aliases:["austria"] },
            "Belarus": { iso:"BLR", aliases:["belarus"] }, "Belgium": { iso:"BEL", aliases:["belgium"] },
            "Bosnia and Herzegovina": { iso:"BIH", aliases:["bosnia", "bosnia and herzegovina"] },
            "Bulgaria": { iso:"BGR", aliases:["bulgaria"] }, "Croatia": { iso:"HRV", aliases:["croatia"] },
            "Czech Republic": { iso:"CZE", aliases:["czechia", "czech republic"] },
            "Denmark": { iso:"DNK", aliases:["denmark"] }, "Estonia": { iso:"EST", aliases:["estonia"] },
            "Finland": { iso:"FIN", aliases:["finland"] }, "France": { iso:"FRA", aliases:["france"] },
            "Germany": { iso:"DEU", aliases:["germany"] }, "Greece": { iso:"GRC", aliases:["greece"] },
            "Hungary": { iso:"HUN", aliases:["hungary"] }, "Iceland": { iso:"ISL", aliases:["iceland"] },
            "Ireland": { iso:"IRL", aliases:["ireland"] }, "Italy": { iso:"ITA", aliases:["italy"] },
            "Latvia": { iso:"LVA", aliases:["latvia"] }, "Lithuania": { iso:"LTU", aliases:["lithuania"] },
            "Luxembourg": { iso:"LUX", aliases:["luxembourg"] }, "Moldova": { iso:"MDA", aliases:["moldova"] },
            "Montenegro": { iso:"MNE", aliases:["montenegro"] }, "Netherlands": { iso:"NLD", aliases:["netherlands", "holland"] },
            "Norway": { iso:"NOR", aliases:["norway"] }, "Poland": { iso:"POL", aliases:["poland"] },
            "Portugal": { iso:"PRT", aliases:["portugal"] }, "Romania": { iso:"ROU", aliases:["romania"] },
            "Russia": { iso:"RUS", aliases:["russia"] }, "Serbia": { iso:"SRB", aliases:["serbia"] },
            "Slovakia": { iso:"SVK", aliases:["slovakia"] }, "Slovenia": { iso:"SVN", aliases:["slovenia"] },
            "Spain": { iso:"ESP", aliases:["spain"] }, "Sweden": { iso:"SWE", aliases:["sweden"] },
            "Switzerland": { iso:"CHE", aliases:["switzerland"] }, "Ukraine": { iso:"UKR", aliases:["ukraine"] },
            "United Kingdom": { iso:"GBR", aliases:["uk", "united kingdom", "britain"] }
        };

        const QUIZ_ISOS = new Set(Object.values(QUIZ_COUNTRIES).map(d => d.iso));
        let questionOrder=[], currentQ=0, score=0, currentName=null;

        async function initMap() {
            const URL = "https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson";
            const r = await fetch(URL);
            const geo = await r.json();
            
            const features = geo.features.filter(f => QUIZ_ISOS.has(f.properties.ISO_A3 || f.id));
            const svg = d3.select("#europe-svg");
            // Centered for wider Europe (Latvia to Portugal)
            const proj = d3.geoMercator().center([20, 55]).scale(550).translate([430, 300]);
            const pathGen = d3.geoPath().projection(proj);

            svg.selectAll(".country")
                .data(features)
                .join("path")
                .attr("class", "country")
                .attr("id", f => "c-" + (f.properties.ISO_A3 || f.id))
                .attr("d", pathGen);
        }

        function startQuiz() {
            questionOrder = Object.keys(QUIZ_COUNTRIES).sort(() => Math.random() - 0.5).slice(0, 10);
            document.getElementById('state-start').classList.add('hidden');
            document.getElementById('progress-bar-wrap').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            currentName = questionOrder[currentQ];
            const iso = QUIZ_COUNTRIES[currentName].iso;
            d3.selectAll(".country").style("fill", "#f8f9f6");
            d3.select("#c-" + iso).style("fill", "#DB7F50");
            
            document.getElementById('q-num').textContent = currentQ + 1;
            document.getElementById('progress-fill').style.width = ((currentQ + 1) / 10 * 100) + "%";
            document.getElementById('state-question').classList.remove('hidden');
            document.getElementById('state-feedback').classList.add('hidden');
            document.getElementById('answer-input').value = "";
            document.getElementById('answer-input').focus();
        }

        function submitAnswer() {
            const val = document.getElementById('answer-input').value.toLowerCase().trim();
            const isCorrect = QUIZ_COUNTRIES[currentName].aliases.some(a => a === val);
            if(isCorrect) score++;
            document.getElementById('feedback').textContent = isCorrect ? "Correct!" : `Oops! That was ${currentName}`;
            document.getElementById('state-question').classList.add('hidden');
            document.getElementById('state-feedback').classList.remove('hidden');
        }

        function nextQuestion() {
            currentQ++;
            if(currentQ < 10) loadQuestion();
            else {
                document.getElementById('state-feedback').classList.add('hidden');
                document.getElementById('results-panel').style.display = 'flex';
                document.getElementById('score-display').textContent = `${score}/10`;
            }
        }

        initMap();
    </script>
</body>
</html>
